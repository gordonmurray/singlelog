data_dir = "/var/lib/vector"

[api]
enabled = true

[sources.nginx]
type = "file"
include = ["/var/log/nginx/access.log"]
read_from = "beginning"

# Parse the nginx combined log format into structured fields so they can be
# queried directly in ClickHouse rather than as one opaque message string.
[transforms.parsed_nginx]
type = "remap"
inputs = ["nginx"]
source = '''
parsed, err = parse_nginx_log(.message, "combined")
if is_null(err) {
  . = merge(., parsed)
}
'''

# Logs go to Tigris, which is S3-compatible: a single global endpoint and
# region "auto". Credentials come from the environment (AWS_ACCESS_KEY_ID /
# AWS_SECRET_ACCESS_KEY), set at boot from the Tigris secret in Secrets Manager.
[sinks.tigris]
type = "aws_s3"
inputs = ["parsed_nginx"]
bucket = "singlelog-logs"
endpoint = "https://t3.storage.dev"
region = "auto"
key_prefix = "nginx/"
compression = "none"
batch.timeout_secs = 60

[sinks.tigris.encoding]
codec = "json"
